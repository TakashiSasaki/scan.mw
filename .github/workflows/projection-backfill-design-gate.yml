name: Projection Backfill Design Gate Harness

on:
  workflow_dispatch:
    inputs:
      operation_validation_manifest_path:
        description: "Repository path to the projection backfill operation validation manifest JSON"
        required: true
        type: string
      execution_design_manifest_path:
        description: "Repository path to the execution design gate manifest JSON (Legacy/manual override)"
        required: false
        type: string
      use_provided_execution_design_manifest:
        description: "Set to 'true' to use the provided execution_design_manifest_path instead of the workflow-generated one"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      environment:
        description: "Label only; copied into generated summary if useful"
        required: false
        default: "local-design-gate"
        type: string
      confirmation_phrase:
        description: "Must be LOCAL_ONLY_DESIGN_GATE"
        required: true
        type: string
      allow_dry_run_only:
        description: "Allow dry-run-only evidence for design-gate workflow validation"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  design-gate-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Intent
        env:
          CONFIRMATION_PHRASE: ${{ github.event.inputs.confirmation_phrase }}
        run: |
          if [ "$CONFIRMATION_PHRASE" != "LOCAL_ONLY_DESIGN_GATE" ]; then
            echo "Error: confirmation_phrase must be exactly 'LOCAL_ONLY_DESIGN_GATE'."
            echo "This phrase explicitly confirms you understand this workflow is local-only and does not perform any execution."
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Focused Tests
        run: |
          npx vitest run tests/projectionRecomputeArtifactLoader.test.ts
          npx vitest run tests/projectionRecomputeArtifactLoaderCliIntegration.test.ts
          npx vitest run tests/projectionBackfillOperationValidationBundle.test.ts
          npx vitest run tests/projectionBackfillExecutionDesignGate.test.ts

      - name: Prepare Artifacts Directory
        run: mkdir -p artifacts/projection-backfill-design-gate

      - name: Validate Local Paths
        env:
          OPERATION_VALIDATION_MANIFEST_PATH: ${{ github.event.inputs.operation_validation_manifest_path }}
          EXECUTION_DESIGN_MANIFEST_PATH: ${{ github.event.inputs.execution_design_manifest_path }}
          USE_PROVIDED_EXECUTION_DESIGN_MANIFEST: ${{ github.event.inputs.use_provided_execution_design_manifest }}
        run: |
          echo "Validating operation validation manifest path..."
          node scripts/validate-local-artifact-path.mjs "$OPERATION_VALIDATION_MANIFEST_PATH"
          if [ "$USE_PROVIDED_EXECUTION_DESIGN_MANIFEST" = "true" ]; then
            echo "Validating execution design manifest path..."
            node scripts/validate-local-artifact-path.mjs "$EXECUTION_DESIGN_MANIFEST_PATH"
          fi

      - name: Validate Projection Backfill Operation
        env:
          OPERATION_VALIDATION_MANIFEST_PATH: ${{ github.event.inputs.operation_validation_manifest_path }}
        run: |
          node scripts/validate-projection-backfill-operation.mjs \
            --manifest "$OPERATION_VALIDATION_MANIFEST_PATH" --json \
            > artifacts/projection-backfill-design-gate/operation-validation-bundle.json

      - name: Generate Temporary Execution Design Manifest
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          cat <<EOF > artifacts/projection-backfill-design-gate/generated-execution-design-manifest.json
          {
            "environment": "$ENVIRONMENT",
            "operator": "github-actions",
            "validationBundles": [
              "operation-validation-bundle.json"
            ],
            "notes": [
              "Generated by projection-backfill-design-gate workflow from operation validation output.",
              "Local-only design gate; not execution approval."
            ]
          }
          EOF

      - name: Assess Execution Design Gate
        env:
          USE_PROVIDED_EXECUTION_DESIGN_MANIFEST: ${{ github.event.inputs.use_provided_execution_design_manifest }}
          EXECUTION_DESIGN_MANIFEST_PATH: ${{ github.event.inputs.execution_design_manifest_path }}
          ALLOW_DRY_RUN_ONLY: ${{ github.event.inputs.allow_dry_run_only }}
        run: |
          ALLOW_DRY_RUN_ARG=""
          if [ "$ALLOW_DRY_RUN_ONLY" = "true" ]; then
            ALLOW_DRY_RUN_ARG="--allow-dry-run-only"
          fi

          MANIFEST_PATH="artifacts/projection-backfill-design-gate/generated-execution-design-manifest.json"
          if [ "$USE_PROVIDED_EXECUTION_DESIGN_MANIFEST" = "true" ]; then
            MANIFEST_PATH="$EXECUTION_DESIGN_MANIFEST_PATH"
          fi

          node scripts/assess-projection-backfill-execution-design.mjs \
            --manifest "$MANIFEST_PATH" --json $ALLOW_DRY_RUN_ARG \
            > artifacts/projection-backfill-design-gate/execution-design-gate.json


      - name: Generate Controlled Execution Design Packet
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          USE_PROVIDED_EXECUTION_DESIGN_MANIFEST: ${{ github.event.inputs.use_provided_execution_design_manifest }}
          EXECUTION_DESIGN_MANIFEST_PATH: ${{ github.event.inputs.execution_design_manifest_path }}
        run: |
          MANIFEST_PATH="artifacts/projection-backfill-design-gate/generated-execution-design-manifest.json"
          if [ "$USE_PROVIDED_EXECUTION_DESIGN_MANIFEST" = "true" ]; then
            MANIFEST_PATH="$EXECUTION_DESIGN_MANIFEST_PATH"
          fi

          if [ ! -f "artifacts/projection-backfill-design-gate/operation-validation-bundle.json" ]; then
             echo "Error: operation-validation-bundle.json does not exist."
             exit 1
          fi

          node scripts/run-projection-backfill-controlled-execution-design-workflow-step.mjs \
            --execution-design-manifest "$MANIFEST_PATH" \
            --gate "artifacts/projection-backfill-design-gate/execution-design-gate.json" \
            --output-dir "artifacts/projection-backfill-design-gate" \
            --environment "$ENVIRONMENT" \
            --operator "github-actions"

      - name: Generate Controlled Execution Review Contract
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          USE_PROVIDED_EXECUTION_DESIGN_MANIFEST: ${{ github.event.inputs.use_provided_execution_design_manifest }}
          EXECUTION_DESIGN_MANIFEST_PATH: ${{ github.event.inputs.execution_design_manifest_path }}
        run: |
          MANIFEST_PATH="artifacts/projection-backfill-design-gate/generated-execution-design-manifest.json"
          if [ "$USE_PROVIDED_EXECUTION_DESIGN_MANIFEST" = "true" ]; then
            MANIFEST_PATH="$EXECUTION_DESIGN_MANIFEST_PATH"
          fi

          if [ ! -f "artifacts/projection-backfill-design-gate/controlled-execution-design-packet.json" ]; then
             echo "Error: controlled-execution-design-packet.json does not exist."
             exit 1
          fi

          node scripts/run-projection-backfill-controlled-execution-review-contract-workflow-step.mjs \
            --execution-design-manifest "$MANIFEST_PATH" \
            --packet "artifacts/projection-backfill-design-gate/controlled-execution-design-packet.json" \
            --gate "artifacts/projection-backfill-design-gate/execution-design-gate.json" \
            --output-dir "artifacts/projection-backfill-design-gate" \
            --environment "$ENVIRONMENT" \
            --operator "github-actions"

      - name: Generate Markdown Summary
        env:
          OPERATION_VALIDATION_MANIFEST_PATH: ${{ github.event.inputs.operation_validation_manifest_path }}
          EXECUTION_DESIGN_MANIFEST_PATH: ${{ github.event.inputs.execution_design_manifest_path }}
          USE_PROVIDED_EXECUTION_DESIGN_MANIFEST: ${{ github.event.inputs.use_provided_execution_design_manifest }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          SUMMARY_FILE="artifacts/projection-backfill-design-gate/summary.md"

          OP_STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('artifacts/projection-backfill-design-gate/operation-validation-bundle.json')).overallStatus || 'unknown')")
          GATE_STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('artifacts/projection-backfill-design-gate/execution-design-gate.json')).overallStatus || 'unknown')")

          MANIFEST_PATH="artifacts/projection-backfill-design-gate/generated-execution-design-manifest.json"
          if [ "$USE_PROVIDED_EXECUTION_DESIGN_MANIFEST" = "true" ]; then
            MANIFEST_PATH="$EXECUTION_DESIGN_MANIFEST_PATH"
          fi

          {
            echo "# Projection Backfill Design Gate Summary"
            echo ""
            echo "- **Workflow:** Projection Backfill Design Gate Harness"
            echo "- **Environment:** $ENVIRONMENT"
            echo "- **Operation Validation Manifest Path:** \`$OPERATION_VALIDATION_MANIFEST_PATH\`"
            echo "- **Execution Design Manifest Path:** \`$MANIFEST_PATH\`"
            echo "- **Operation Validation Bundle Overall Status:** \`$OP_STATUS\`"
            echo "- **Execution Design Gate Overall Status:** \`$GATE_STATUS\`"
            if [ -f artifacts/projection-backfill-design-gate/controlled-execution-design-packet.json ]; then
              PACKET_STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('artifacts/projection-backfill-design-gate/controlled-execution-design-packet.json')).overallStatus || 'unknown')")
              echo "- **Controlled Execution Design Packet Status:** \`$PACKET_STATUS\`"
            fi
            if [ -f artifacts/projection-backfill-design-gate/controlled-execution-review-contract.json ]; then
              CONTRACT_STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('artifacts/projection-backfill-design-gate/controlled-execution-review-contract.json')).overallStatus || 'unknown')")
              echo "- **Controlled Execution Review Contract Status:** \`$CONTRACT_STATUS\`"
            fi
            echo ""
            echo "**Safety Boundaries & Constraints:**"
            echo "- **Review contract is not execution approval.**"
            echo "- **Future execution requires separate explicit approval.**"
            echo "- **Local-Only:** This workflow executed entirely within GitHub Actions using checked-in repository artifacts."
            echo "- **No Firebase Call:** The run did not authenticate with or call Firebase."
            echo "- **No Firestore Write:** No data was modified."
            echo "- **No Deploy:** No code or configuration was deployed."
            echo "- **No Backfill Execution:** This workflow only validates evidence."
            echo "- **No UI Read Switching Authorization:** This artifact does not authorize turning on reads from projection summaries in UI."
            echo ""
            echo "The highest possible positive status for this gate is \`ready-for-execution-design\`."
            echo "This means the submitted validation evidence was internally consistent, but further operational planning is required before any writes take place."
            echo "It does **not** signify execution approval."
          } > $SUMMARY_FILE

          # Copy to GITHUB_STEP_SUMMARY
          cat $SUMMARY_FILE >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: projection-backfill-design-gate
          path: artifacts/projection-backfill-design-gate/
